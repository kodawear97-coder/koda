<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Ayan - Premium Food Photo Recreation</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&amp;family=Inter:wght@300;400;500;600&amp;display=swap" rel="stylesheet"/>
<style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
        }
        
        .slide-container {
            position: relative;
            width: 1280px;
            height: 720px;
            overflow: hidden;
            background: linear-gradient(135deg, #1a1a1a 0%, #0d0d0d 100%);
        }
        
        .hero-gradient {
            position: absolute;
            top: 0;
            right: 0;
            width: 60%;
            height: 100%;
            background: radial-gradient(ellipse at top right, rgba(255, 107, 53, 0.15) 0%, transparent 70%);
        }
        
        .food-pattern {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 40%;
            background: url("https://page.gensparksite.com/slides_images/63bfe007023caf8668aa860d2802a1bf.jpg") center/cover;
            opacity: 0.1;
            filter: blur(2px);
        }
        
        .floating-element {
            animation: float 6s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }
        
        .glow-effect {
            box-shadow: 0 0 30px rgba(255, 107, 53, 0.3);
        }
        
        .text-glow {
            text-shadow: 0 0 20px rgba(255, 107, 53, 0.5);
        }
        
        .card-shadow {
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }
        
        .btn-hover:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(255, 107, 53, 0.4);
        }
    </style>
</head>
<body>
<div class="slide-container">
<div class="hero-gradient"></div>
<div class="food-pattern"></div>
<div class="absolute inset-0 flex items-center justify-between px-16 py-12">
<div class="w-1/2 z-10">
<div class="flex items-center gap-3 mb-8">
<div class="w-12 h-12 bg-gradient-to-br from-orange-500 to-red-600 rounded-full flex items-center justify-center">
<i class="fas fa-camera text-white text-xl"></i>
</div>
<span class="text-white text-2xl font-bold font-['Montserrat']">AYAN</span>
</div>
<div class="mb-6">
<h1 class="text-5xl font-bold text-white font-['Montserrat'] leading-tight mb-4">
<span class="text-transparent bg-clip-text bg-gradient-to-r from-orange-400 to-red-500">Premium Food</span><br/>
<span class="text-white">Photo Recreation</span>
</h1>
<p class="text-xl text-gray-300 font-['Inter'] mb-2">
                        Normal photos ko banaayein <span class="text-orange-400 font-semibold">premium ad-style visuals</span>
</p>
</div>
<div class="bg-white/10 backdrop-blur-sm rounded-xl p-4 mb-6 border border-white/20">
<p class="text-gray-300 text-sm leading-relaxed">
<i class="fas fa-check-circle text-green-400 mr-2"></i>
                        For Restaurants | Cafes | Cloud Kitchens<br/>
<i class="fas fa-check-circle text-green-400 mr-2"></i>
                        Elevate your menu, boost orders, wow your customers
                    </p>
</div>
<div class="flex gap-4">
<button class="bg-gradient-to-r from-orange-500 to-red-600 text-white px-6 py-3 rounded-full font-semibold text-sm btn-hover transition-all duration-300 flex items-center gap-2">
<i class="fas fa-camera"></i>
                        Start Your Project
                    </button>
<button class="border-2 border-white/30 text-white px-6 py-3 rounded-full font-semibold text-sm hover:bg-white/10 transition-all duration-300 flex items-center gap-2">
<i class="fas fa-play"></i>
                        View Demo
                    </button>
</div>
</div>
<div class="w-1/2 flex justify-center items-center">
<div class="relative">
<div class="w-[500px] h-[400px] rounded-2xl overflow-hidden shadow-2xl border-4 border-white/20">
<img alt="Premium Burger" class="w-full h-full object-cover" src="https://page.gensparksite.com/slides_images/390a1c97f11b6c61ae4bcefd00348a34.jpg"/>
<div class="absolute inset-0 bg-gradient-to-t from-black/50 to-transparent"></div>
<div class="absolute top-4 right-4 bg-white/20 backdrop-blur-md rounded-lg px-3 py-2 flex items-center gap-2">
<i class="fas fa-star text-yellow-400"></i>
<span class="text-white text-sm font-semibold">4.9</span>
</div>
</div>
<div class="absolute -top-4 -left-4 w-20 h-20 bg-orange-500/20 rounded-full blur-xl floating-element"></div>
<div class="absolute -bottom-4 -right-4 w-32 h-32 bg-red-500/20 rounded-full blur-xl floating-element" style="animation-delay: 1s;"></div>
</div>
</div>
</div>
<div class="absolute bottom-8 left-16 right-16 flex justify-between items-center">
<div class="flex gap-8">
<div class="text-center">
<div class="text-2xl font-bold text-white font-['Montserrat']">500+</div>
<div class="text-xs text-gray-400">Projects Done</div>
</div>
<div class="text-center">
<div class="text-2xl font-bold text-white font-['Montserrat']">98%</div>
<div class="text-xs text-gray-400">Client Satisfaction</div>
</div>
<div class="text-center">
<div class="text-2xl font-bold text-white font-['Montserrat']">24h</div>
<div class="text-xs text-gray-400">Delivery Time</div>
</div>
</div>
<div class="flex items-center gap-2">
<div class="flex -space-x-2">
<img class="w-8 h-8 rounded-full border-2 border-white" src="https://page.gensparksite.com/slides_images/af909849e330f795e87b4e2f2fbd359e.jpg"/>
<img class="w-8 h-8 rounded-full border-2 border-white" src="https://page.gensparksite.com/slides_images/62ce95d1d3492450996300d4cf5cc7de.jpg"/>
<img class="w-8 h-8 rounded-full border-2 border-white" src="https://page.gensparksite.com/slides_images/f15a91aa47f72507de4b85f7aa63df43.jpg"/>
</div>
<span class="text-white text-sm">+100 happy clients</span>
</div>
</div>
<div class="absolute top-20 right-20 w-2 h-2 bg-orange-500 rounded-full"></div>
<div class="absolute top-40 right-40 w-3 h-3 bg-red-500 rounded-full"></div>
<div class="absolute bottom-40 right-60 w-2 h-2 bg-yellow-500 rounded-full"></div>
</div>
</body>
</html>
